# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  BUILD_TYPE: Debug

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        compiler: [gcc, clang]
        include:
          - compiler: gcc
            cc: gcc-13
            cxx: g++-13
          - compiler: clang
            cc: clang-17
            cxx: clang++-17

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build
        if [ "${{ matrix.compiler }}" = "clang" ]; then
          sudo apt-get install -y clang-17
        fi

    - name: Configure CMake
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
          -DCMAKE_C_COMPILER=${{ matrix.cc }} \
          -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} \
          -DCMAKE_CXX_FLAGS="-Wno-interference-size"

    - name: Build
      run: cmake --build build

    - name: Run unit tests
      run: |
        cd build
        ./bin/test_order_book

    - name: Run feature tests
      run: |
        cd build
        ./bin/feature_test

    - name: Run main simulation (smoke test)
      run: |
        cd build
        timeout 10 ./bin/exchange_sim --ticks 1000 --symbols 5 || true

  # Separate job for sanitizers (slower)
  sanitizers:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build

    - name: Configure with sanitizers
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Debug \
          -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer -Wno-interference-size"

    - name: Build
      run: cmake --build build

    - name: Run tests with ASAN
      run: |
        cd build
        ASAN_OPTIONS=detect_leaks=1 ./bin/test_order_book

  # Static analysis
  static-analysis:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Install cppcheck
      run: sudo apt-get install -y cppcheck

    - name: Run cppcheck
      run: |
        cppcheck --enable=warning,style,performance \
          --error-exitcode=1 \
          --suppress=missingIncludeSystem \
          --inline-suppr \
          -I include \
          src/ include/
      continue-on-error: true  # Don't fail build on style warnings initially

  # Documentation check
  docs:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Check README exists
      run: test -f README.md
    
    - name: Check ROADMAP exists
      run: test -f ROADMAP.md
