name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  BUILD_TYPE: Release

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build
        
    - name: Cache Catch2
      id: cache-catch2
      uses: actions/cache@v4
      with:
        path: ~/catch2
        key: catch2-v3.5.0
        
    - name: Install Catch2
      if: steps.cache-catch2.outputs.cache-hit != 'true'
      run: |
        git clone --branch v3.5.0 --depth 1 https://github.com/catchorg/Catch2.git
        cd Catch2
        cmake -B build -S . -DBUILD_TESTING=OFF -DCMAKE_INSTALL_PREFIX=~/catch2
        cmake --build build --target install
        
    - name: Configure CMake
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
          -DCMAKE_PREFIX_PATH=~/catch2 \
          -DBUILD_TESTS=ON
          
    - name: Build
      run: cmake --build build --target unit_tests --config ${{ env.BUILD_TYPE }}
      
    - name: Run unit tests
      working-directory: build
      run: ctest --output-on-failure --timeout 120
      
  build-debug:
    runs-on: ubuntu-24.04
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build
        
    - name: Configure CMake (Debug + Sanitizers)
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Debug \
          -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer"
          
    - name: Build
      run: cmake --build build
      
    - name: Run with sanitizers
      working-directory: build
      run: |
        export ASAN_OPTIONS=detect_leaks=1
        ./bin/exchange_sim --symbols 2 --agents 10 --ticks 1000 || true

  benchmark:
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build
        
    - name: Cache Google Benchmark
      id: cache-gbench
      uses: actions/cache@v4
      with:
        path: ~/benchmark
        key: benchmark-v1.8.3
        
    - name: Install Google Benchmark
      if: steps.cache-gbench.outputs.cache-hit != 'true'
      run: |
        git clone --branch v1.8.3 --depth 1 https://github.com/google/benchmark.git
        cd benchmark
        cmake -B build -S . -DBENCHMARK_ENABLE_TESTING=OFF -DCMAKE_INSTALL_PREFIX=~/benchmark
        cmake --build build --target install
        
    - name: Configure CMake
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_PREFIX_PATH=~/benchmark \
          -DBUILD_BENCHMARKS=ON
          
    - name: Build
      run: cmake --build build
      
    - name: Run benchmarks
      run: |
        if [ -f build/bin/benchmarks ]; then
          build/bin/benchmarks --benchmark_format=json > benchmark_results.json
          echo "## Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          build/bin/benchmarks --benchmark_format=console >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        fi
        
    - name: Track benchmark history
      uses: benchmark-action/github-action-benchmark@v1
      if: hashFiles('benchmark_results.json') != ''
      with:
        tool: 'googlecpp'
        output-file-path: benchmark_results.json
        github-token: ${{ secrets.GITHUB_TOKEN }}
        auto-push: true
        alert-threshold: '150%'
        comment-on-alert: true
        
  clang-format:
    runs-on: ubuntu-24.04
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Check formatting
      run: |
        find src include -name '*.cpp' -o -name '*.hpp' | \
          xargs clang-format --dry-run --Werror || \
          echo "::warning::Code formatting issues found. Run clang-format locally."
